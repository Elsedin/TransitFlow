services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: transitflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - transitflow-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transitflow-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - transitflow-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitflow-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=${JWT__ISSUER:-TransitFlowAPI}
      - Jwt__Audience=${JWT__AUDIENCE:-TransitFlowUsers}
      - Jwt__ExpirationMinutes=${JWT__EXPIRATIONMINUTES:-60}
      - RabbitMQ__HostName=${RABBITMQ__HOSTNAME:-rabbitmq}
      - RabbitMQ__Port=${RABBITMQ__PORT:-5672}
      - RabbitMQ__UserName=${RABBITMQ__USERNAME:-guest}
      - RabbitMQ__Password=${RABBITMQ__PASSWORD:-guest}
      - Stripe__SecretKey=${STRIPE__SECRETKEY}
      - PayPal__ClientId=${PAYPAL__CLIENTID}
      - PayPal__ClientSecret=${PAYPAL__CLIENTSECRET}
      - PayPal__IsSandbox=${PAYPAL__ISSANDBOX:-true}
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - transitflow-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: transitflow-worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=${RABBITMQ__HOSTNAME:-rabbitmq}
      - RabbitMQ__Port=${RABBITMQ__PORT:-5672}
      - RabbitMQ__UserName=${RABBITMQ__USERNAME:-guest}
      - RabbitMQ__Password=${RABBITMQ__PASSWORD:-guest}
    depends_on:
      - rabbitmq
    networks:
      - transitflow-network

volumes:
  rabbitmq_data:
  sqlserver_data:

networks:
  transitflow-network:
    driver: bridge
