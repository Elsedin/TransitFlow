services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: transitflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - transitflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 15s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transitflow-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
      MSSQL_PID: "Express"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - transitflow-network
    healthcheck:
      test: ["CMD-SHELL", "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; [ -x $$SQLCMD ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd; $$SQLCMD -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -b -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitflow-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=${JWT__ISSUER:-TransitFlowAPI}
      - Jwt__Audience=${JWT__AUDIENCE:-TransitFlowUsers}
      - Jwt__ExpirationMinutes=${JWT__EXPIRATIONMINUTES:-60}
      - RabbitMQ__HostName=${RABBITMQ__HOSTNAME:-rabbitmq}
      - RabbitMQ__Port=${RABBITMQ__PORT:-5672}
      - RabbitMQ__UserName=${RABBITMQ__USERNAME:-guest}
      - RabbitMQ__Password=${RABBITMQ__PASSWORD:-guest}
      - Stripe__SecretKey=${STRIPE__SECRETKEY}
      - PayPal__ClientId=${PAYPAL__CLIENTID}
      - PayPal__ClientSecret=${PAYPAL__CLIENTSECRET}
      - PayPal__IsSandbox=${PAYPAL__ISSANDBOX:-true}
      - PayPal__BamToUsdRate=${PAYPAL__BAMTOUSDRATE:-1.95583}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - transitflow-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: transitflow-worker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQ__HostName=${RABBITMQ__HOSTNAME:-rabbitmq}
      - RabbitMQ__Port=${RABBITMQ__PORT:-5672}
      - RabbitMQ__UserName=${RABBITMQ__USERNAME:-guest}
      - RabbitMQ__Password=${RABBITMQ__PASSWORD:-guest}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - transitflow-network

volumes:
  rabbitmq_data:
  sqlserver_data:

networks:
  transitflow-network:
    driver: bridge
